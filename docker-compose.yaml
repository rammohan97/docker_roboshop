services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb

  catalogue:
    image: catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb

  redis:
    image: redis:7
    container_name: redis

  mysql:
    image: mysql:v1
    container_name: mysql

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123

  user:
    image: user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis

  cart:
    image: cart:v1
    container_name: cart
    depends_on:
      - catalogue
      - redis

  shipping:
    image: shipping:v1
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    image: payment:v1
    container_name: payment
    depends_on:
      - rabbitmq
      - cart
      - user

  frontend:
    image: frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - user
      - catalogue
      - cart
      - shipping
      - payment

networks:
  default:
    driver: bridge
    name: roboshop
    external: true # True if you have already created the network, false if you want docker-compose to create it for you.
